name: TrendLab Daily Discovery

on:
  schedule:
    # Runs at 02:30 UTC (08:00 AM IST) every day
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scout_and_post:
    runs-on: ubuntu-latest
    environment: production # This triggers the "Manual Approval" gate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Reconstruct Environment
        run: |
          # Create .env for API keys
          echo "GEMINI_KEY=${{ secrets.GEMINI_KEY }}" > .env
          echo "TAVILY_KEY=${{ secrets.TAVILY_KEY }}" >> .env
          
          # Create Safety Policy
          echo '${{ secrets.SAFETY_POLICY_JSON }}' > safety_policy.json
          
          # Create Session Cookies
          echo '${{ secrets.LI_COOKIES }}' > linkedin_cookies.json
          echo '${{ secrets.TW_COOKIES }}' > twitter_cookies.json

      - name: Run Trend Scout
        run: python tracker.py

      - name: Organic Social Post
        run: python post_social.py