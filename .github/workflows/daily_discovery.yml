name: TrendLab Daily Discovery

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scout_and_sync:
    runs-on: ubuntu-latest
    environment: production 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # We keep Playwright only if tracker.py uses it for scraping
          # python -m playwright install --with-deps chromium

      - name: Reconstruct Configs
        run: |
          echo '${{ secrets.SAFETY_POLICY_JSON }}' > safety_policy.json
          
      - name: Run Trend Scout
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          GEMINI_MODEL: "models/gemini-flash-latest"
        run: python tracker.py

      - name: Sync via Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Use the built-in token
        run: |
          git config --global user.name "Nishant Kumar Verma"
          git config --global user.email "nkverma88015@gmail.com"
          
          # 1. Create a unique branch name
          BRANCH_NAME="intel-update-$(date +'%Y-%m-%d-%H%M')"
          git checkout -b $BRANCH_NAME

          # 2. Add and commit the data
          git add data/trends.csv
          
          # Check for changes to avoid errors
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping PR."
            exit 0
          fi
          
          git commit -m "Intelligence Update: $(date +'%Y-%m-%d')"
          
          # 3. Push the new branch
          git push origin $BRANCH_NAME

          # 4. Create the PR using the GitHub CLI
          gh pr create \
            --title "🚀 TrendLab: New Intelligence Data ($(date +'%Y-%m-%d'))" \
            --body "Trend Scout has identified new signals. Please review and merge to update the dashboard." \
            --base main \
            --head $BRANCH_NAME