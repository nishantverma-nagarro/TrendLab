name: TrendLab Daily Discovery

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scout_and_sync:
    runs-on: ubuntu-latest
    environment: production 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          # We keep Playwright only if tracker.py uses it for scraping
          # python -m playwright install --with-deps chromium

      - name: Reconstruct Configs
        run: |
          echo '${{ secrets.SAFETY_POLICY_JSON }}' > safety_policy.json
          
      - name: Run Trend Scout
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          GEMINI_MODEL: "models/gemini-1.5-flash"
        run: python tracker.py

      - name: Sync Intelligence Data
        run: |
          git config --global user.name "TrendLab-Bot"
          git config --global user.email "bot@trendlab.ai"
          # Only add the data folder/file
          git add data/trends.csv
          # This line checks if there are actual changes to prevent "Empty Commit" errors
          git diff --quiet && git diff --staged --quiet || (git commit -m "Intelligence Update: $(date +'%Y-%m-%d')" && git push)